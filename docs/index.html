<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Stiga Barsanti</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --blue:        #3B6FFF;
    --blue-glow:   rgba(59, 111, 255, 0.28);
    --red:         #F04444;
    --red-glow:    rgba(240, 68, 68, 0.25);
    --green:       #22C55E;
    --green-glow:  rgba(34, 197, 94, 0.25);
    --bg:          #05070d;
    --surface:     #0d1117;
    --surface2:    #161b22;
    --border:      #222833;
    --border-focus:#3b82f6;
    --text:        #ffffff;
    --text-mid:    #c9d1d9;
    --text-muted:  #8b949e;
    --shadow-lg:   0 24px 64px rgba(0,0,0,0.55), 0 8px 24px rgba(0,0,0,0.4);
    --radius:      20px;
    --radius-sm:   16px;
    --radius-xs:   10px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ─── SPLASH ─── */
  #splash {
    position: fixed;
    inset: 0;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    animation: splashFade 1.2s ease forwards;
    animation-delay: 2.8s;
    pointer-events: none;
  }

  .splash-inner {
    display: flex;
    align-items: center;
    justify-content: center;
    animation: splashZoom 3s ease forwards;
  }

  .splash-inner img {
    width: 300px;
    max-width: 80vw;
  }

  @keyframes splashZoom {
    0%   { transform: scale(1);    opacity: 1; }
    70%  { transform: scale(1.08); opacity: 1; }
    100% { transform: scale(2.2);  opacity: 0; }
  }

  @keyframes splashFade {
    to { opacity: 0; visibility: hidden; }
  }

  /* ─── BODY ─── */
  body {
    background: radial-gradient(circle at 30% 20%, #0f1623 0%, #05070d 65%);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    top: -20%; right: -15%;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(59,111,255,0.06) 0%, transparent 65%);
    pointer-events: none; border-radius: 50%;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -15%; left: -10%;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(34,197,94,0.05) 0%, transparent 65%);
    pointer-events: none; border-radius: 50%;
  }

  /* ─── CARD ─── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    width: 420px;
    max-width: 100%;
    box-shadow: var(--shadow-lg);
    overflow: hidden;
    position: relative;
    z-index: 1;
    opacity: 0;
    transform: translateY(36px);
    animation: showCard 0.9s cubic-bezier(.16,1,.3,1) forwards;
    animation-delay: 3.4s;
  }

  @keyframes showCard {
    to { opacity: 1; transform: translateY(0); }
  }

  /* ─── HEADER ─── */
  .card-header {
    padding: 26px 30px 22px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-wrap {
    width: 44px; height: 44px;
    background: var(--blue);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 4px 18px var(--blue-glow);
  }
  .logo-wrap svg { width: 22px; height: 22px; fill: #fff; }

  .header-copy h1 {
    font-size: 16px; font-weight: 700;
    color: var(--text); letter-spacing: -.2px; line-height: 1.2;
  }
  .header-copy p {
    font-size: 12px; color: var(--text-muted);
    margin-top: 2px; font-weight: 400;
  }

  /* ─── BODY ─── */
  .card-body { padding: 28px 30px 30px; }

  .top-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 30px;
    padding: 10px 16px;
    text-align: center;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-mid);
    margin-bottom: 28px;
  }

  .card-title {
    font-size: 26px; font-weight: 700;
    color: var(--text);
    margin-bottom: 10px;
    letter-spacing: -.4px;
  }

  .card-subtitle {
    font-size: 13.5px;
    color: var(--text-muted);
    line-height: 1.6;
    margin-bottom: 28px;
  }

  /* ─── CAMPO / INPUT ─── */
  .campo { margin-bottom: 16px; }

  .input-wrap { position: relative; display: flex; align-items: center; }

  .input-wrap .ico {
    position: absolute; left: 16px;
    color: var(--text-muted); display: flex; pointer-events: none;
  }
  .input-wrap .ico svg {
    width: 16px; height: 16px;
    stroke: currentColor; fill: none;
    stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
  }

  input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 16px 16px 16px 42px;
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 14.5px; font-weight: 400;
    outline: none;
    transition: border-color .18s, box-shadow .18s;
  }
  input:focus {
    border-color: var(--border-focus);
    box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
  }
  input::placeholder { color: var(--text-muted); }

  /* ─── TOGGLE PASSWORD ─── */
  .btn-occhio {
    position: absolute; right: 14px;
    background: none; border: none;
    color: var(--text-muted);
    cursor: pointer; padding: 4px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 6px;
    transition: color .15s, background .15s;
  }
  .btn-occhio:hover { color: var(--text-mid); background: rgba(255,255,255,0.05); }
  .btn-occhio svg {
    width: 16px; height: 16px;
    stroke: currentColor; fill: none;
    stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    pointer-events: none;
  }
  #passwordInput { padding-right: 44px; }

  /* ─── BUTTONS ─── */
  .btn {
    width: 100%;
    border: none;
    font-family: 'Outfit', sans-serif;
    font-size: 14px; font-weight: 700;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s, filter .15s, background .15s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn:disabled { opacity: .45; cursor: not-allowed; }
  .btn:active:not(:disabled) { transform: scale(.975); }

  .btn-primary {
    background: var(--surface2);
    color: var(--text);
    border-radius: 40px;
    padding: 16px 20px;
    border: 1px solid var(--border);
    margin-top: 10px;
    letter-spacing: .5px;
  }
  .btn-primary:hover:not(:disabled) {
    background: #1f2937;
    transform: scale(1.025);
    border-color: #374151;
  }

  .btn-verde {
    background: rgba(34,197,94,0.12);
    color: var(--green);
    border-radius: var(--radius-sm);
    padding: 14px 20px;
    border: 1px solid rgba(34,197,94,0.25);
  }
  .btn-verde:hover:not(:disabled) {
    background: rgba(34,197,94,0.2);
    box-shadow: 0 0 20px rgba(34,197,94,0.15);
    transform: translateY(-1px);
  }

  .btn-rosso {
    background: rgba(240,68,68,0.1);
    color: var(--red);
    border-radius: var(--radius-sm);
    padding: 14px 20px;
    border: 1px solid rgba(240,68,68,0.2);
  }
  .btn-rosso:hover:not(:disabled) {
    background: rgba(240,68,68,0.18);
    box-shadow: 0 0 20px rgba(240,68,68,0.12);
    transform: translateY(-1px);
  }

  /* ─── ERROR ─── */
  .errore-box {
    background: rgba(240,68,68,0.08);
    border: 1px solid rgba(240,68,68,0.2);
    border-radius: var(--radius-xs);
    padding: 11px 14px;
    font-size: 13px; color: #f87171;
    margin-top: 14px; display: none; font-weight: 500;
  }
  .errore-box.visibile { display: flex; align-items: center; gap: 8px; }
  .errore-box::before { content: '⚠'; font-size: 14px; flex-shrink: 0; }

  /* ─── TERMS ─── */
  .terms {
    margin-top: 22px;
    font-size: 12.5px;
    color: var(--text-muted);
    line-height: 1.5;
    text-align: center;
  }
  .terms a { color: var(--text-mid); text-decoration: underline; }

  /* ─── DASHBOARD ─── */
  #dashboard { display: none; }
  #dashboard.visibile { display: block; animation: showCard .45s cubic-bezier(.16,1,.3,1) both; }

  .saluto {
    font-size: 13px; color: var(--text-muted);
    margin-bottom: 20px;
  }
  .saluto strong { color: var(--text); font-weight: 600; }

  .scheda-robot {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 16px;
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 18px;
  }

  .robot-icona {
    width: 46px; height: 46px;
    background: rgba(59,111,255,0.12);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    border: 1px solid rgba(59,111,255,0.2);
  }
  .robot-icona svg { width: 22px; height: 22px; fill: var(--blue); }

  .robot-info h2 {
    font-size: 15px; font-weight: 700; color: var(--text); line-height: 1.2;
  }
  .robot-info p { font-size: 12px; color: var(--text-muted); margin-top: 3px; }

  .stato-badge {
    margin-left: auto;
    display: inline-flex; align-items: center; gap: 6px;
    border-radius: 20px; padding: 5px 10px;
    font-size: 11.5px; font-weight: 600;
    transition: all .35s; flex-shrink: 0;
  }
  .stato-badge.attesa    { background: rgba(139,148,158,0.1); color: var(--text-muted); border: 1px solid var(--border); }
  .stato-badge.movimento { background: rgba(34,197,94,0.1);  color: #4ade80; border: 1px solid rgba(34,197,94,0.25); }
  .stato-badge.arresto   { background: rgba(240,68,68,0.1);  color: #f87171; border: 1px solid rgba(240,68,68,0.2); }

  .pallino { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
  .pallino.pulsa { animation: pulsa 1.4s infinite; }
  @keyframes pulsa {
    0%,100% { opacity:1; transform:scale(1); }
    50%      { opacity:.3; transform:scale(.7); }
  }

  .griglia-controlli {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; margin-bottom: 18px;
  }

  .sep { height: 1px; background: var(--border); margin: 18px 0; }

  .link-disconnetti {
    background: none; border: none;
    color: var(--text-muted);
    font-family: 'Outfit', sans-serif;
    font-size: 13px; font-weight: 500;
    cursor: pointer; padding: 0;
    display: inline-flex; align-items: center; gap: 5px;
    transition: color .15s;
  }
  .link-disconnetti:hover { color: var(--red); }

  /* ─── SPINNER ─── */
  .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,.2);
    border-top-color: currentColor;
    border-radius: 50%;
    animation: gira .65s linear infinite; flex-shrink: 0;
  }
  @keyframes gira { to { transform: rotate(360deg); } }

  /* ─── TOAST ─── */
  .toast {
    position: fixed;
    bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(70px);
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 40px; padding: 11px 22px;
    font-size: 13px; font-weight: 500;
    box-shadow: 0 8px 28px rgba(0,0,0,0.5);
    transition: transform .32s cubic-bezier(.16,1,.3,1), opacity .32s;
    opacity: 0; z-index: 999;
    white-space: nowrap; max-width: calc(100vw - 48px);
    display: flex; align-items: center; gap: 8px;
  }
  .toast.mostra  { transform: translateX(-50%) translateY(0); opacity: 1; }
  .toast.successo { background: rgba(34,197,94,0.15); color: #4ade80; border-color: rgba(34,197,94,0.25); }
  .toast.errore-t { background: rgba(240,68,68,0.12); color: #f87171; border-color: rgba(240,68,68,0.2); }
</style>
</head>
<body>

<!-- ─── SPLASH ─── -->
<div id="splash">
  <div class="splash-inner">
    <img src="/Users/michelepepe/Desktop/Stuff/Project1_Stiga_App_BDPP_Site/Images/bg_LaunchLogo.png" alt="STIGA x Barsanti School">
  </div>
</div>

<!-- ─── CARD ─── -->
<div class="card">

  <!-- LOGIN -->
  <div id="loginPanel">
    <div class="card-body">
      <div class="card-title">Bentornato</div>
      <p class="card-subtitle">Inserisci le tue credenziali per accedere al pannello di controllo del tuo robot.</p>

      <div class="campo">
        <div class="input-wrap">
          <span class="ico"><svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 7 10-7"/></svg></span>
          <input type="email" id="emailInput" placeholder="Indirizzo e-mail" autocomplete="email">
        </div>
      </div>
      <div class="campo">
        <div class="input-wrap">
          <span class="ico"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg></span>
          <input type="password" id="passwordInput" placeholder="••••••••" autocomplete="current-password">
          <button type="button" class="btn-occhio" id="btnOcchio" onclick="togglePassword()" tabindex="-1" aria-label="Mostra/nascondi password">
            <svg id="iconaOcchio" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <div class="errore-box" id="erroreLogin"></div>
      <button class="btn btn-primary" id="loginBtn" onclick="gestisciLogin()">CONTINUA</button>

      <p class="terms">
        Continuando, confermo di aver letto e accettato la
        <a href="privacy.html" target="_blank">Informativa sulla privacy</a> e il
        <a href="licenza.html" target="_blank">Contratto di licenza</a>.
      </p>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard">
    <div class="card-body">
      <div class="saluto">Benvenuto, <strong id="nomeUtenteDisplay"></strong> 👋</div>
      <div class="scheda-robot">
        <div class="robot-icona">
          <svg viewBox="0 0 24 24"><path d="M19 9H5a1 1 0 00-1 1v1H3a1 1 0 000 2h1v1a1 1 0 001 1h14a1 1 0 001-1v-1h1a1 1 0 000-2h-1v-1a1 1 0 00-1-1zm-7 5a1.5 1.5 0 110-3 1.5 1.5 0 010 3zM5 8V6a1 1 0 011-1h12a1 1 0 011 1v2H5z"/></svg>
        </div>
        <div class="robot-info">
          <h2 id="nomeRobotDisplay">—</h2>
          <p>Robot tagliaerba</p>
        </div>
        <div class="stato-badge attesa" id="statoBadge">
          <span class="pallino" id="pallinoBadge"></span>
          <span id="testoStato">In attesa</span>
        </div>
      </div>

      <div style="margin-bottom: 18px;">
        <button class="btn btn-verde" id="btnAvvia" onclick="gestisciAvvio()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M5 3l14 9-14 9V3z"/></svg>
          Avvia
        </button>
        <button class="btn btn-rosso" id="btnFerma" onclick="gestisciArresto()" style="display:none;">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
          Ferma
        </button>
      </div>

      <div class="sep"></div>
      <button class="link-disconnetti" onclick="gestisciLogout()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Disconnetti
      </button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  const CHIAVE_FIREBASE = 'AIzaSyCPtRBU_hwWZYsguHp9ucGrfNac0kXR6ug';
  const BASE_STIGA = 'https://connectivity-production.stiga.com';

  let token = null;
  let uuid  = null;

  setTimeout(() => {
    document.getElementById('splash').style.display = 'none';
    document.title = 'Login - Stiga Barsanti';
  }, 5000);

  function togglePassword() {
    const input  = document.getElementById('passwordInput');
    const icona  = document.getElementById('iconaOcchio');
    const visibile = input.type === 'text';
    input.type = visibile ? 'password' : 'text';
    icona.innerHTML = visibile
      ? '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'
      : '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
  }

  function mostraToast(msg, tipo = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast mostra ' + tipo;
    setTimeout(() => { t.className = 'toast'; }, 3000);
  }

  function impostaCaricamento(btn, caricamento, etichetta, icona = '') {
    btn.disabled = caricamento;
    btn.innerHTML = caricamento
      ? `<span class="spinner"></span>${etichetta}`
      : (icona + etichetta);
  }

  function impostaStato(stato) {
    const badge   = document.getElementById('statoBadge');
    const pallino = document.getElementById('pallinoBadge');
    const testo   = document.getElementById('testoStato');
    badge.className   = 'stato-badge ' + stato;
    pallino.className = 'pallino' + (stato !== 'attesa' ? ' pulsa' : '');
    const etichette = { attesa: 'In attesa', movimento: 'In movimento', arresto: 'Fermando…' };
    testo.textContent = etichette[stato] || 'In attesa';
  }

  function mostraErrore(msg) {
    const el = document.getElementById('erroreLogin');
    el.textContent = msg;
    el.classList.add('visibile');
  }

  function pulisciErrore() {
    document.getElementById('erroreLogin').classList.remove('visibile');
  }

  async function gestisciLogin() {
    pulisciErrore();
    const email    = document.getElementById('emailInput').value.trim();
    const password = document.getElementById('passwordInput').value;
    const btn      = document.getElementById('loginBtn');
    if (!email || !password) { mostraErrore('Inserisci email e password per continuare.'); return; }
    impostaCaricamento(btn, true, 'Accesso in corso…');
    try {
      const rispAuth = await fetch(
        `https://www.googleapis.com/identitytoolkit/v3/relyingparty/verifyPassword?key=${CHIAVE_FIREBASE}`,
        { method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password, returnSecureToken: true }) }
      );
      const datiAuth = await rispAuth.json();
      if (!rispAuth.ok) {
        const codice = datiAuth?.error?.message || '';
        let msgErrore = 'Email o password non corretti. Riprova.';
        if (codice === 'TOO_MANY_ATTEMPTS_TRY_LATER') {
          msgErrore = 'Troppi tentativi falliti. Riprova più tardi.';
        } else if (codice === 'USER_DISABLED') {
          msgErrore = 'Account disabilitato. Contatta il supporto.';
        }
        mostraErrore(msgErrore);
        impostaCaricamento(btn, false, 'CONTINUA'); return;
      }
      token = datiAuth.idToken;
      document.getElementById('nomeUtenteDisplay').textContent =
        datiAuth.displayName || email.split('@')[0];

      const rispGarage = await fetch(`${BASE_STIGA}/api/garage/integration`,
        { headers: { Authorization: `Bearer ${token}` } });
      if (!rispGarage.ok) {
        mostraErrore('Impossibile recuperare il robot. Codice: ' + rispGarage.status);
        impostaCaricamento(btn, false, 'CONTINUA'); return;
      }
      const datiGarage  = await rispGarage.json();
      const dispositivo = datiGarage?.data?.[0];
      if (!dispositivo) {
        mostraErrore('Nessun robot trovato associato a questo account.');
        impostaCaricamento(btn, false, 'CONTINUA'); return;
      }
      uuid = dispositivo.attributes.uuid;
      document.getElementById('nomeRobotDisplay').textContent =
        dispositivo.attributes.name || 'Robot STIGA';

      document.getElementById('loginPanel').style.display = 'none';
      document.getElementById('dashboard').classList.add('visibile');
      impostaCaricamento(btn, false, 'CONTINUA');
    } catch (err) {
      mostraErrore('Errore di rete: ' + err.message);
      impostaCaricamento(btn, false, 'CONTINUA');
    }
  }

  async function gestisciAvvio() {
  const btn = document.getElementById('btnAvvia');
  impostaCaricamento(btn, true, 'Avviando…');
  try {
    const risp = await fetch(`${BASE_STIGA}/api/devices/${uuid}/command/startsession`, {
      method: 'POST',                                      // ← era GET, il C# usa POST
      headers: {
        'Authorization': `Bearer ${token}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({})                             // ← body vuoto, come nel C#
    });
    if (risp.ok) {
      impostaStato('movimento');
      mostraToast('✓ Robot avviato con successo', 'successo');
      document.getElementById('btnAvvia').style.display = 'none';
      document.getElementById('btnFerma').style.display = '';
    } else {
      mostraToast('Errore durante l\'avvio (' + risp.status + ')', 'errore-t');
      impostaCaricamento(btn, false, 'Avvia',
        '<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M5 3l14 9-14 9V3z"/></svg>');
    }
  } catch (err) {
    mostraToast('Errore di rete: ' + err.message, 'errore-t');
    impostaCaricamento(btn, false, 'Avvia',
      '<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M5 3l14 9-14 9V3z"/></svg>');
  }
}

async function gestisciArresto() {
  const btn = document.getElementById('btnFerma');
  impostaCaricamento(btn, true, 'Fermando…');
  impostaStato('arresto');
  try {
    const risp = await fetch(`${BASE_STIGA}/api/devices/${uuid}/command/endsession`, {
      method: 'POST',                                      // ← era GET, il C# usa POST
      headers: {
        'Authorization': `Bearer ${token}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({})                             // ← body vuoto, come nel C#
    });
    impostaStato('attesa');
    if (risp.ok) mostraToast('✓ Robot fermato', 'successo');
    else mostraToast('Errore durante l\'arresto (' + risp.status + ')', 'errore-t');
  } catch (err) {
    impostaStato('attesa');
    mostraToast('Errore di rete: ' + err.message, 'errore-t');
  }
  document.getElementById('btnFerma').style.display = 'none';
  document.getElementById('btnAvvia').style.display = '';
  impostaCaricamento(document.getElementById('btnAvvia'), false, 'Avvia',
    '<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M5 3l14 9-14 9V3z"/></svg>');
}

  function gestisciLogout() {
    token = uuid = null;
    document.getElementById('emailInput').value = '';
    document.getElementById('passwordInput').value = '';
    document.getElementById('dashboard').classList.remove('visibile');
    document.getElementById('dashboard').style.display = '';
    document.getElementById('loginPanel').style.display = '';
    document.getElementById('btnAvvia').style.display = '';
    document.getElementById('btnFerma').style.display = 'none';
    impostaStato('attesa');
    pulisciErrore();
  }

  ['emailInput','passwordInput'].forEach(id =>
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') gestisciLogin();
    })
  );
</script>
