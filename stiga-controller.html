<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STIGA — Pannello di Controllo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --blue:        #3B6FFF;
    --blue-light:  #EEF2FF;
    --blue-glow:   rgba(59, 111, 255, 0.22);
    --red:         #F04444;
    --red-light:   #FEF2F2;
    --red-glow:    rgba(240, 68, 68, 0.2);
    --green:       #22C55E;
    --green-light: #F0FDF4;
    --bg:          #F4F6FB;
    --surface:     #FFFFFF;
    --surface2:    #F8F9FC;
    --border:      #E4E8F0;
    --text:        #0F1733;
    --text-mid:    #4A5578;
    --text-muted:  #9BA8C0;
    --shadow-lg:   0 20px 60px rgba(15,23,51,0.10), 0 8px 24px rgba(15,23,51,0.07);
    --radius:      20px;
    --radius-sm:   12px;
    --radius-xs:   8px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    top: -30%; right: -20%;
    width: 700px; height: 700px;
    background: radial-gradient(circle, rgba(59,111,255,0.07) 0%, transparent 65%);
    pointer-events: none;
    border-radius: 50%;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -20%; left: -15%;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(34,197,94,0.06) 0%, transparent 65%);
    pointer-events: none;
    border-radius: 50%;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    width: 440px;
    max-width: 100%;
    box-shadow: var(--shadow-lg);
    overflow: hidden;
    position: relative;
    z-index: 1;
    animation: fadeUp .55s cubic-bezier(.16,1,.3,1) both;
  }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(24px); }
    to   { opacity:1; transform:translateY(0); }
  }

  .card-header {
    padding: 28px 32px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-wrap {
    width: 46px; height: 46px;
    background: var(--blue);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 4px 14px var(--blue-glow);
  }
  .logo-wrap svg { width: 24px; height: 24px; fill: #fff; }

  .header-copy h1 {
    font-size: 17px; font-weight: 700;
    color: var(--text); letter-spacing: -.2px; line-height: 1.2;
  }
  .header-copy p {
    font-size: 12.5px; color: var(--text-muted);
    margin-top: 2px; font-weight: 400;
  }

  .card-body { padding: 28px 32px 32px; }

  .campo { margin-bottom: 16px; }

  .campo label {
    display: block;
    font-size: 12px; font-weight: 600;
    letter-spacing: .6px; text-transform: uppercase;
    color: var(--text-mid); margin-bottom: 7px;
  }

  .input-wrap { position: relative; display: flex; align-items: center; }

  .input-wrap .ico {
    position: absolute; left: 14px;
    color: var(--text-muted); display: flex; pointer-events: none;
  }
  .input-wrap .ico svg {
    width: 16px; height: 16px;
    stroke: currentColor; fill: none;
    stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
  }

  input {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 13px 14px 13px 40px;
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 14px; font-weight: 400;
    outline: none;
    transition: border-color .18s, box-shadow .18s, background .18s;
  }
  input:focus {
    border-color: var(--blue);
    background: #fff;
    box-shadow: 0 0 0 3.5px rgba(59,111,255,.12);
  }
  input::placeholder { color: var(--text-muted); }

  .btn {
    width: 100%; padding: 13.5px 20px;
    border: none; border-radius: var(--radius-sm);
    font-family: 'Outfit', sans-serif;
    font-size: 14px; font-weight: 600; letter-spacing: .1px;
    cursor: pointer;
    transition: transform .14s, box-shadow .14s, filter .14s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .btn:active:not(:disabled) { transform: scale(.975); }

  .btn-blue {
    background: var(--blue); color: #fff;
    box-shadow: 0 4px 18px var(--blue-glow);
    margin-top: 8px;
  }
  .btn-blue:hover:not(:disabled) {
    filter: brightness(1.08);
    box-shadow: 0 6px 24px rgba(59,111,255,.35);
    transform: translateY(-1px);
  }

  .btn-verde {
    background: var(--green); color: #fff;
    box-shadow: 0 4px 18px rgba(34,197,94,.25);
  }
  .btn-verde:hover:not(:disabled) {
    filter: brightness(1.07);
    box-shadow: 0 6px 24px rgba(34,197,94,.38);
    transform: translateY(-1px);
  }

  .btn-rosso {
    background: var(--red); color: #fff;
    box-shadow: 0 4px 18px var(--red-glow);
  }
  .btn-rosso:hover:not(:disabled) {
    filter: brightness(1.07);
    box-shadow: 0 6px 24px rgba(240,68,68,.35);
    transform: translateY(-1px);
  }

  .errore-box {
    background: var(--red-light);
    border: 1.5px solid rgba(240,68,68,.2);
    border-radius: var(--radius-xs);
    padding: 11px 14px;
    font-size: 13px; color: #B91C1C;
    margin-top: 14px; display: none; font-weight: 500;
  }
  .errore-box.visibile { display: flex; align-items: center; gap: 8px; }
  .errore-box::before { content: '⚠'; font-size: 14px; flex-shrink: 0; }

  #dashboard { display: none; }
  #dashboard.visibile { display: block; animation: fadeUp .45s cubic-bezier(.16,1,.3,1) both; }

  .saluto {
    font-size: 13.5px; color: var(--text-mid);
    margin-bottom: 20px; font-weight: 400;
  }
  .saluto strong { color: var(--text); font-weight: 600; }

  .scheda-robot {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 18px;
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 20px;
  }

  .robot-icona {
    width: 50px; height: 50px;
    background: var(--blue-light);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .robot-icona svg { width: 24px; height: 24px; fill: var(--blue); }

  .robot-info h2 {
    font-size: 16px; font-weight: 700;
    color: var(--text); line-height: 1.2;
  }
  .robot-info p { font-size: 12px; color: var(--text-muted); margin-top: 3px; }

  .stato-badge {
    margin-left: auto;
    display: inline-flex; align-items: center; gap: 6px;
    border-radius: 20px; padding: 5px 11px;
    font-size: 12px; font-weight: 600;
    transition: all .35s; flex-shrink: 0;
  }
  .stato-badge.attesa    { background: #F1F5F9; color: var(--text-muted); border: 1.5px solid var(--border); }
  .stato-badge.movimento { background: var(--green-light); color: #15803D; border: 1.5px solid rgba(34,197,94,.25); }
  .stato-badge.arresto   { background: #FFF7ED; color: #C2410C; border: 1.5px solid rgba(245,158,11,.25); }

  .pallino {
    width: 7px; height: 7px;
    border-radius: 50%; background: currentColor; flex-shrink: 0;
  }
  .pallino.pulsa { animation: pulsa 1.4s infinite; }
  @keyframes pulsa {
    0%,100% { opacity:1; transform:scale(1); }
    50%      { opacity:.35; transform:scale(.75); }
  }

  .griglia-controlli {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 12px; margin-bottom: 20px;
  }

  .sep { height: 1px; background: var(--border); margin: 20px 0; }

  .link-disconnetti {
    background: none; border: none;
    color: var(--text-muted);
    font-family: 'Outfit', sans-serif;
    font-size: 13px; font-weight: 500;
    cursor: pointer; padding: 0;
    display: inline-flex; align-items: center; gap: 5px;
    transition: color .15s;
  }
  .link-disconnetti:hover { color: var(--red); }

  .spinner {
    width: 15px; height: 15px;
    border: 2px solid rgba(255,255,255,.35);
    border-top-color: #fff;
    border-radius: 50%;
    animation: gira .65s linear infinite; flex-shrink: 0;
  }
  @keyframes gira { to { transform: rotate(360deg); } }

  .toast {
    position: fixed;
    bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(70px);
    background: var(--text); color: #fff;
    border-radius: 40px; padding: 11px 22px;
    font-size: 13.5px; font-weight: 500;
    box-shadow: 0 8px 28px rgba(15,23,51,.22);
    transition: transform .32s cubic-bezier(.16,1,.3,1), opacity .32s;
    opacity: 0; z-index: 999;
    white-space: nowrap; max-width: calc(100vw - 48px);
    display: flex; align-items: center; gap: 8px;
  }
  .toast.mostra  { transform: translateX(-50%) translateY(0); opacity: 1; }
  .toast.successo { background: #15803D; }
  .toast.errore-t { background: var(--red); }
</style>
</head>
<body>

<div class="card">

  <!-- ─── LOGIN ─── -->
  <div id="loginPanel">
    <div class="card-header">
      <div class="logo-wrap">
        <svg viewBox="0 0 24 24"><path d="M19 9H5a1 1 0 00-1 1v1H3a1 1 0 000 2h1v1a1 1 0 001 1h14a1 1 0 001-1v-1h1a1 1 0 000-2h-1v-1a1 1 0 00-1-1zm-7 5a1.5 1.5 0 110-3 1.5 1.5 0 010 3zM5 8V6a1 1 0 011-1h12a1 1 0 011 1v2H5z"/></svg>
      </div>
      <div class="header-copy">
        <h1>STIGA Pannello di Controllo</h1>
        <p>Accedi con il tuo account STIGA</p>
      </div>
    </div>
    <div class="card-body">
      <div class="campo">
        <label>Indirizzo email</label>
        <div class="input-wrap">
          <span class="ico"><svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 7 10-7"/></svg></span>
          <input type="email" id="emailInput" placeholder="nome@esempio.it" autocomplete="email">
        </div>
      </div>
      <div class="campo">
        <label>Password</label>
        <div class="input-wrap">
          <span class="ico"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg></span>
          <input type="password" id="passwordInput" placeholder="••••••••" autocomplete="current-password">
        </div>
      </div>
      <div class="errore-box" id="erroreLogin"></div>
      <button class="btn btn-blue" id="loginBtn" onclick="gestisciLogin()">Accedi</button>
    </div>
  </div>

  <!-- ─── DASHBOARD ─── -->
  <div id="dashboard">
    <div class="card-header">
      <div class="logo-wrap">
        <svg viewBox="0 0 24 24"><path d="M19 9H5a1 1 0 00-1 1v1H3a1 1 0 000 2h1v1a1 1 0 001 1h14a1 1 0 001-1v-1h1a1 1 0 000-2h-1v-1a1 1 0 00-1-1zm-7 5a1.5 1.5 0 110-3 1.5 1.5 0 010 3zM5 8V6a1 1 0 011-1h12a1 1 0 011 1v2H5z"/></svg>
      </div>
      <div class="header-copy">
        <h1>STIGA Pannello di Controllo</h1>
        <p>Dispositivo connesso e pronto</p>
      </div>
    </div>
    <div class="card-body">
      <div class="saluto">Benvenuto, <strong id="nomeUtenteDisplay"></strong> 👋</div>
      <div class="scheda-robot">
        <div class="robot-icona">
          <svg viewBox="0 0 24 24"><path d="M19 9H5a1 1 0 00-1 1v1H3a1 1 0 000 2h1v1a1 1 0 001 1h14a1 1 0 001-1v-1h1a1 1 0 000-2h-1v-1a1 1 0 00-1-1zm-7 5a1.5 1.5 0 110-3 1.5 1.5 0 010 3zM5 8V6a1 1 0 011-1h12a1 1 0 011 1v2H5z"/></svg>
        </div>
        <div class="robot-info">
          <h2 id="nomeRobotDisplay">—</h2>
          <p>Robot tagliaerba</p>
        </div>
        <div class="stato-badge attesa" id="statoBadge">
          <span class="pallino" id="pallinoBadge"></span>
          <span id="testoStato">In attesa</span>
        </div>
      </div>
      <div class="griglia-controlli">
        <button class="btn btn-verde" id="btnAvvia" onclick="gestisciAvvio()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M5 3l14 9-14 9V3z"/></svg>
          Avvia
        </button>
        <button class="btn btn-rosso" id="btnFerma" onclick="gestisciArresto()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
          Ferma
        </button>
      </div>
      <div class="sep"></div>
      <button class="link-disconnetti" onclick="gestisciLogout()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Disconnetti
      </button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  const CHIAVE_FIREBASE = 'AIzaSyCPtRBU_hwWZYsguHp9ucGrfNac0kXR6ug';
  const BASE_STIGA = 'https://connectivity-production.stiga.com';

  let token = null;
  let uuid  = null;

  function mostraToast(msg, tipo = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast mostra ' + tipo;
    setTimeout(() => { t.className = 'toast'; }, 3000);
  }

  function impostaCaricamento(btn, caricamento, etichetta, icona = '') {
    btn.disabled = caricamento;
    btn.innerHTML = caricamento
      ? `<span class="spinner"></span>${etichetta}`
      : (icona + etichetta);
  }

  function impostaStato(stato) {
    const badge   = document.getElementById('statoBadge');
    const pallino = document.getElementById('pallinoBadge');
    const testo   = document.getElementById('testoStato');
    badge.className   = 'stato-badge ' + stato;
    pallino.className = 'pallino' + (stato !== 'attesa' ? ' pulsa' : '');
    const etichette = { attesa: 'In attesa', movimento: 'In movimento', arresto: 'Fermando…' };
    testo.textContent = etichette[stato] || 'In attesa';
  }

  function mostraErrore(msg) {
    const el = document.getElementById('erroreLogin');
    el.textContent = msg;
    el.classList.add('visibile');
  }

  function pulisciErrore() {
    document.getElementById('erroreLogin').classList.remove('visibile');
  }

  async function gestisciLogin() {
    pulisciErrore();
    const email    = document.getElementById('emailInput').value.trim();
    const password = document.getElementById('passwordInput').value;
    const btn      = document.getElementById('loginBtn');
    if (!email || !password) { mostraErrore('Inserisci email e password per continuare.'); return; }
    impostaCaricamento(btn, true, 'Accesso in corso…');
    try {
      const rispAuth = await fetch(
        `https://www.googleapis.com/identitytoolkit/v3/relyingparty/verifyPassword?key=${CHIAVE_FIREBASE}`,
        { method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password, returnSecureToken: true }) }
      );
      const datiAuth = await rispAuth.json();
      if (!rispAuth.ok) {
        mostraErrore('Errore di accesso: ' + (datiAuth?.error?.message || 'Credenziali non valide'));
        impostaCaricamento(btn, false, 'Accedi'); return;
      }
      token = datiAuth.idToken;
      document.getElementById('nomeUtenteDisplay').textContent =
        datiAuth.displayName || email.split('@')[0];

      const rispGarage = await fetch(`${BASE_STIGA}/api/garage/integration`,
        { headers: { Authorization: `Bearer ${token}` } });
      if (!rispGarage.ok) {
        mostraErrore('Impossibile recuperare il robot. Codice: ' + rispGarage.status);
        impostaCaricamento(btn, false, 'Accedi'); return;
      }
      const datiGarage  = await rispGarage.json();
      const dispositivo = datiGarage?.data?.[0];
      if (!dispositivo) {
        mostraErrore('Nessun robot trovato associato a questo account.');
        impostaCaricamento(btn, false, 'Accedi'); return;
      }
      uuid = dispositivo.attributes.uuid;
      document.getElementById('nomeRobotDisplay').textContent =
        dispositivo.attributes.name || 'Robot STIGA';

      document.getElementById('loginPanel').style.display = 'none';
      document.getElementById('dashboard').classList.add('visibile');
      impostaCaricamento(btn, false, 'Accedi');
    } catch (err) {
      mostraErrore('Errore di rete: ' + err.message);
      impostaCaricamento(btn, false, 'Accedi');
    }
  }

  async function gestisciAvvio() {
    const btn = document.getElementById('btnAvvia');
    impostaCaricamento(btn, true, 'Avviando…');
    try {
      const risp = await fetch(`${BASE_STIGA}/api/devices/${uuid}/command/startsession`,
        { headers: { Authorization: `Bearer ${token}` } });
      if (risp.ok) { impostaStato('movimento'); mostraToast('✓ Robot avviato con successo', 'successo'); }
      else mostraToast('Errore durante l\'avvio (' + risp.status + ')', 'errore-t');
    } catch (err) { mostraToast('Errore di rete: ' + err.message, 'errore-t'); }
    impostaCaricamento(btn, false, 'Avvia',
      '<svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M5 3l14 9-14 9V3z"/></svg>');
  }

  async function gestisciArresto() {
    const btn = document.getElementById('btnFerma');
    impostaCaricamento(btn, true, 'Fermando…');
    impostaStato('arresto');
    try {
      const risp = await fetch(`${BASE_STIGA}/api/devices/${uuid}/command/endsession`,
        { headers: { Authorization: `Bearer ${token}` } });
      impostaStato('attesa');
      if (risp.ok) mostraToast('✓ Robot fermato', 'successo');
      else mostraToast('Errore durante l\'arresto (' + risp.status + ')', 'errore-t');
    } catch (err) { impostaStato('attesa'); mostraToast('Errore di rete: ' + err.message, 'errore-t'); }
    impostaCaricamento(btn, false, 'Ferma',
      '<svg width="14" height="14" viewBox="0 0 24 24" fill="white"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>');
  }

  function gestisciLogout() {
    token = uuid = null;
    document.getElementById('emailInput').value = '';
    document.getElementById('passwordInput').value = '';
    document.getElementById('dashboard').classList.remove('visibile');
    document.getElementById('dashboard').style.display = '';
    document.getElementById('loginPanel').style.display = '';
    impostaStato('attesa');
    pulisciErrore();
  }

  ['emailInput','passwordInput'].forEach(id =>
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') gestisciLogin();
    })
  );
</script>
</body>
</html>
